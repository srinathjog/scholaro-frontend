<router-outlet></router-outlet>

<!-- ── PWA Update Toast ── -->
<div *ngIf="showUpdateToast"
     class="fixed bottom-20 inset-x-0 z-[9999] flex justify-center px-4 pointer-events-none">
  <div class="flex items-center gap-3 bg-gray-900 text-white px-5 py-3.5 rounded-2xl shadow-2xl
              pointer-events-auto max-w-sm w-full">
    <span class="text-xl shrink-0">🚀</span>
    <p class="flex-1 text-sm font-medium leading-snug">
      A new version of Scholaro is ready.
    </p>
    <button (click)="applyUpdate()"
            class="shrink-0 bg-indigo-500 hover:bg-indigo-400 active:bg-indigo-600
                   text-white text-xs font-bold px-3 py-1.5 rounded-lg transition-colors
                   whitespace-nowrap">
      Update Now
    </button>
  </div>
</div>
