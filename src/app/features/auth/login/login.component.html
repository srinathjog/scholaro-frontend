
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-green-50 py-8 px-2">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()"
    class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 flex flex-col gap-4">
    <!-- Preschool Logo Placeholder -->
    <div class="flex flex-col items-center mb-2">
      <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mb-2">
        <span class="text-3xl text-blue-400 font-bold">Logo</span>
      </div>
      <h2 class="text-2xl font-extrabold text-gray-800 mb-1">Welcome to Preschool</h2>
      <p class="text-gray-500 text-sm mb-2">Sign in to your account</p>
    </div>

    <!-- Email -->
    <div>
      <label class="block mb-1 font-medium text-gray-700" for="email">Email</label>
      <input id="email" type="email" formControlName="email"
        class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 transition text-gray-800 bg-gray-50"
        [class.border-red-400]="email?.invalid && (email?.touched || email?.dirty)">
      <div *ngIf="email?.invalid && (email?.touched || email?.dirty)" class="text-red-500 text-xs mt-1">
        <span *ngIf="email?.errors?.['required']">Email is required.</span>
        <span *ngIf="email?.errors?.['email']">Enter a valid email.</span>
      </div>
    </div>

    <!-- Password -->
    <div>
      <label class="block mb-1 font-medium text-gray-700" for="password">Password</label>
      <input id="password" type="password" formControlName="password"
        class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 transition text-gray-800 bg-gray-50"
        [class.border-red-400]="password?.invalid && (password?.touched || password?.dirty)">
      <div *ngIf="password?.invalid && (password?.touched || password?.dirty)" class="text-red-500 text-xs mt-1">
        <span *ngIf="password?.errors?.['required']">Password is required.</span>
        <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters.</span>
      </div>
    </div>

    <!-- School Code (hidden for Super Admin) -->
    <div *ngIf="!isSuperAdmin">
      <label class="block mb-1 font-medium text-gray-700" for="schoolCode">School Code</label>
      <input id="schoolCode" type="text" formControlName="schoolCode"
        class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 transition text-gray-800 bg-gray-50"
        [class.border-red-400]="schoolCode?.invalid && (schoolCode?.touched || schoolCode?.dirty)">
      <div *ngIf="schoolCode?.invalid && (schoolCode?.touched || schoolCode?.dirty)" class="text-red-500 text-xs mt-1">
        <span *ngIf="schoolCode?.errors?.['required']">School code is required.</span>
      </div>
    </div>

    <!-- Super Admin Badge -->
    <div *ngIf="isSuperAdmin"
         class="bg-slate-800 text-white rounded-lg px-4 py-2.5 text-center text-sm font-medium">
      🛡️ Platform Super Admin Login
    </div>

    <!-- Login Button -->
    <button type="submit"
      class="w-full bg-gradient-to-r from-blue-500 to-green-400 text-white py-2.5 rounded-lg font-bold text-lg shadow-md hover:from-blue-600 hover:to-green-500 transition disabled:opacity-60 disabled:cursor-not-allowed"
      [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="text-red-600 text-center mt-2">{{ errorMessage }}</div>

    <!-- Forgot Password Link -->
    <div class="flex justify-between items-center mt-2">
      <button type="button" (click)="toggleSuperAdmin()"
        class="text-xs font-medium transition"
        [ngClass]="isSuperAdmin ? 'text-slate-600 hover:text-slate-800' : 'text-gray-400 hover:text-gray-600'">
        {{ isSuperAdmin ? '← Back to School Login' : '🛡️ Super Admin?' }}
      </button>
      <a routerLink="/forgot-password" class="text-blue-500 hover:underline text-sm font-medium">Forgot Password?</a>
    </div>
  </form>
</div>
